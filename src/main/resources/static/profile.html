<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - Daily Bugle</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

<header class="topbar">
    <div class="logo">DAILY BUGLE</div>
    <nav id="navbar"></nav>
</header>

<div class="profile-container">

    <div class="profile-header">
        <h1 id="profileName"></h1>
        <div id="profileEmail"></div>
        <div id="profileRole" class="role-badge"></div>
    </div>

    <div class="profile-grid">
        <div id="ratingsSection" class="profile-card"></div>
        <div id="commentsSection" class="profile-card"></div>
        <div id="articlesSection" class="profile-card"></div>
    </div>

</div>

<script src="app.js"></script>
<script src="profile.js"></script>
</body>
</html>
