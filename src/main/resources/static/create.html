<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - Daily Bugle</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

<header class="topbar">
    <div class="logo">DAILY BUGLE</div>
    <nav id="navbar"></nav>
</header>

<div class="article-container">

    <h1 class="auth-title">CREATE ARTICLE</h1>

    <form id="createForm" class="auth-form">

        <input type="text" id="title" placeholder="Title" required>

        <input type="text" id="synopsis" placeholder="Synopsis" required>

        <textarea id="content" placeholder="Content" rows="8" required></textarea>



        <input type="datetime-local" id="publishAt">

        <input type="text" id="keywords" placeholder="Keywords (comma separated)">

        <button type="submit" class="auth-btn">PUBLISH</button>

    </form>

    <p id="errorMessage" class="error-message"></p>

</div>

<script src="app.js"></script>
<script src="create.js"></script>
</body>
</html>
